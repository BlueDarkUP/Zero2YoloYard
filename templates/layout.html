<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Zero2YoloYard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* 布局特定的补充样式 (Move cursor logic to CSS variables) */
        :root {
            --cursor-x: 50vw;
            --cursor-y: 50vh;
        }

        /* 光标探照灯效果：在 body 上叠加一个跟随鼠标的径向渐变 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(
                circle 600px at var(--cursor-x) var(--cursor-y),
                rgba(0, 240, 255, 0.06) 0%,
                transparent 60%
            );
            pointer-events: none;
            z-index: 1;
            transition: background 0.1s ease-out; /* 让探照灯略带滞后感，更显沉稳 */
        }

        /* 底部系统状态栏 */
        .system-status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background-color: var(--bg-surface-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            z-index: 9999;
            text-transform: uppercase;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-right: 20px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--color-success);
            margin-right: 8px;
            box-shadow: 0 0 5px var(--color-success);
        }

        /* 确保内容不被底部栏遮挡 */
        main {
            padding-bottom: 40px;
        }

        /* 修复硬编码的警报动画 */
        @keyframes alert-blink {
            0% { opacity: 1; text-shadow: 0 0 10px var(--color-danger); color: var(--color-danger); }
            50% { opacity: 0.3; text-shadow: none; color: var(--color-danger); }
            100% { opacity: 1; text-shadow: 0 0 10px var(--color-danger); color: var(--color-danger); }
        }
        .feed-alert { animation: alert-blink 2s infinite; }

        /* ==================== SYSTEM BOOT SPLASH (Minimalist) ==================== */
        .telemetry-splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .telemetry-splash-screen.boot-complete {
            opacity: 0; pointer-events: none; transform: scale(1.02);
        }
        .splash-center {
            width: 380px; display: flex; flex-direction: column; align-items: flex-start;
        }
        .splash-title {
            font-family: 'Inter', sans-serif; font-size: 1.8rem; font-weight: 600;
            letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px;
        }
        .splash-title.locked { color: #ffffff; }
        .splash-subtitle {
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
            color: var(--text-secondary); letter-spacing: 0.1em; margin-bottom: 30px; text-transform: uppercase;
        }
        .splash-bar-container {
            width: 100%; height: 1px; background: rgba(255, 255, 255, 0.08);
            position: relative; overflow: hidden; margin-bottom: 12px;
        }
        .splash-bar-fill {
            height: 100%; width: 0%; background-color: #ffffff; transition: width 0.1s linear;
        }
        .splash-logs-container {
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted);
            width: 100%; height: 70px; overflow: hidden; display: flex; flex-direction: column-reverse; line-height: 1.6;
        }
        .splash-log-line { animation: flash-in 0.1s ease-out forwards; white-space: nowrap; }
        @keyframes flash-in {
            0% { opacity: 0; color: #ffffff; }
            100% { opacity: 1; color: var(--text-muted); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="telemetry-splash" class="telemetry-splash-screen">
        <div class="splash-center">
            <div class="splash-title">
                <span id="splash-glitch-text">ZERO 2 YOLO YARD</span>
            </div>
            <div class="splash-subtitle">SYS_INIT // ZERO2YOLO-YARD</div>
            <div class="splash-bar-container">
                <div id="splash-bar" class="splash-bar-fill"></div>
            </div>
            <div id="splash-logs" class="splash-logs-container"></div>
        </div>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark pt-3 pb-3 px-4 border-bottom" style="background: rgba(10,11,16,0.95); border-color: var(--border-color) !important; z-index: 100;">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="bi bi-bounding-box text-primary mr-3" style="font-size: 1.5rem; opacity: 0.9;"></i>
            <div class="d-flex flex-column justify-content-center mt-1">
                <span class="font-weight-bold" style="font-family: 'Inter', sans-serif; letter-spacing: 0.05em; line-height: 1.1; font-size: 1.2rem; text-transform: uppercase;">ZERO 2 YOLO YARD</span>
                <span class="small text-muted" style="font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em;">// Developed by BlueDarkUP</span>
            </div>
        </a>

        <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mr-auto"></ul>

            <div class="d-flex align-items-center text-right">
                <div class="d-none d-md-block mr-4 text-right">
                    <div class="small text-muted font-monospace" style="font-size: 0.7rem;">BE BASED ON FMLTC</div>
                    <div class="small text-primary font-monospace" style="font-size: 0.6rem;">SECURE_CONNECTION_ESTABLISHED</div>
                </div>
                <i class="bi bi-broadcast feed-alert" title="LIVE FEED"></i>
            </div>
        </div>
    </nav>

    <main role="main" class="flex-grow-1 position-relative" style="z-index: 10;">
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <script>
        // ==================== BOOT SEQUENCE LOGIC ====================
        document.addEventListener("DOMContentLoaded", () => {
            const splash = document.getElementById("telemetry-splash");
            if (!splash) return;

            // 1. 获取 Flask 传过来的最新启动 ID（如果没有传，默认值为 'fallback'）
            const serverBootId = "{{ server_boot_id | default('fallback') }}";

            // 2. 读取浏览器本地存储的上一次启动 ID
            const savedBootId = localStorage.getItem("z2y_last_boot_id");

            // 3. 核心拦截：如果后端程序没有重启过（ID相同），直接秒删动画，用户感受不到遮挡
            if (serverBootId !== 'fallback' && savedBootId === serverBootId) {
                splash.style.display = 'none';
                splash.remove();
                return;
            }

            // ==================== 动画执行序列 ====================
            // 禁用滚动条
            document.body.style.overflow = "hidden";

            const logsContainer = document.getElementById("splash-logs");
            const barFill = document.getElementById("splash-bar");
            const titleSpan = document.getElementById("splash-glitch-text");
            const titleContainer = document.querySelector(".splash-title");

            const logPool =[
                "sys: mounting kernel drivers...",
                "net: pywebview uplink established.",
                "mem: allocating vram blocks (40.5%)",
                "sam: loading deep learning core...",
                "mobilenet: feature extractor ready.",
                "data: verifying dataset schema...",
                "auth: override accepted.",
                "ui: initializing workspace..."
            ];

            let progress = 0;
            let logIndex = 0;
            const finalWord = "ZERO 2 YOLO YARD";
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_/[]";

            // 文字乱码
            let scrambleInterval = setInterval(() => {
                let scrambled = "";
                for(let i = 0; i < finalWord.length; i++) {
                    if (finalWord[i] === " ") scrambled += " ";
                    else scrambled += chars[Math.floor(Math.random() * chars.length)];
                }
                titleSpan.innerText = scrambled;
            }, 30);

            // 进度与日志输出
            const bootInterval = setInterval(() => {
                progress += Math.random() * 8 + 3;
                if (progress >= 100) progress = 100;

                barFill.style.width = progress + "%";

                if (Math.random() > 0.4 && logIndex < logPool.length) {
                    const logElement = document.createElement("div");
                    logElement.className = "splash-log-line";
                    const timestamp = new Date().toISOString().substring(11, 23);
                    logElement.innerText = `[${timestamp}] ${logPool[logIndex]}`;
                    logsContainer.prepend(logElement);
                    logIndex++;
                }

                // 完成启动
                if (progress === 100) {
                    clearInterval(bootInterval);
                    clearInterval(scrambleInterval);

                    titleSpan.innerText = finalWord;
                    titleContainer.classList.add("locked");

                    const finalLog = document.createElement("div");
                    finalLog.className = "splash-log-line";
                    finalLog.style.color = "#ffffff";
                    finalLog.innerText = `[${new Date().toISOString().substring(11, 23)}] boot sequence complete.`;
                    logsContainer.prepend(finalLog);

                    // 【核心记录】：播放完毕后，记录这次的启动 ID，下次刷新就不会再播了
                    if (serverBootId !== 'fallback') {
                        localStorage.setItem("z2y_last_boot_id", serverBootId);
                    }

                    // 动画退场
                    setTimeout(() => {
                        splash.classList.add("boot-complete");
                        document.body.style.overflow = "auto";
                        setTimeout(() => splash.remove(), 500); // 清理 DOM
                    }, 600);
                }
            }, 60);
        });

        // 光标探照灯逻辑：引入 requestAnimationFrame 节流，消除掉帧
        let isCursorTicking = false;
        document.addEventListener('mousemove', (e) => {
            if (!isCursorTicking) {
                window.requestAnimationFrame(() => {
                    document.documentElement.style.setProperty('--cursor-x', e.clientX + 'px');
                    document.documentElement.style.setProperty('--cursor-y', e.clientY + 'px');
                    isCursorTicking = false;
                });
                isCursorTicking = true;
            }
        });

        // 模拟底层系统数据波动 (Telemetry Simulation)
        setInterval(() => {
            const latency = Math.floor(Math.random() * (18 - 8 + 1)) + 8; // 8-18ms
            const memory = (40 + Math.random() * 5).toFixed(1); // 40.0 - 45.0%
            const sysLatencyEl = document.getElementById('sys-latency');
            const sysMemoryEl = document.getElementById('sys-memory');
            if(sysLatencyEl) sysLatencyEl.innerText = latency + 'ms';
            if(sysMemoryEl) sysMemoryEl.innerText = memory + '%';
        }, 2000);
    </script>

    <div class="modal fade" id="sysConfirmModal" tabindex="-1" role="dialog" style="z-index: 99999;">
        <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
            <div class="modal-content" style="background: rgba(10,11,16,0.95); border: 1px solid var(--color-danger); box-shadow: 0 0 20px rgba(255, 0, 50, 0.2);">
                <div class="modal-body text-center pt-4 pb-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 2rem;"></i>
                    <p id="sysConfirmMessage" class="mt-3 font-weight-bold font-monospace text-white small tracking-wider"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4 pt-0">
                    <button type="button" class="btn btn-sm btn-outline-secondary font-monospace tracking-wider px-3" data-dismiss="modal">ABORT</button>
                    <button type="button" class="btn btn-sm btn-danger font-monospace tracking-wider px-3" id="sysConfirmBtn">PROCEED</button>
                </div>
            </div>
        </div>
    </div>

    <div aria-live="polite" aria-atomic="true" style="position: fixed; top: 80px; right: 20px; z-index: 99999;">
        <div id="sys-toast-container"></div>
    </div>

    <style>
        .sys-toast {
            background: rgba(10,11,16,0.95);
            border-left: 4px solid var(--color-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        .sys-toast.toast-error { border-left-color: var(--color-danger); }
        .sys-toast.toast-success { border-left-color: var(--color-success); }
    </style>

    <script>
        // 全局挂载：系统级提示函数
        window.sysAlert = function(message, type = 'success') {
            const toastId = 'toast-' + Date.now() + Math.floor(Math.random() * 1000);
            const title = type === 'error' ? 'SYS_ERROR' : 'SYS_NOTICE';
            const icon = type === 'error' ? 'bi-x-octagon-fill text-danger' : 'bi-info-circle-fill text-success';
            const toastClass = type === 'error' ? 'toast-error' : 'toast-success';

            const toastHtml = `
                <div id="${toastId}" class="toast sys-toast ${toastClass} mb-2" role="alert" aria-live="assertive" aria-atomic="true" data-delay="${type === 'error' ? '5000' : '3000'}">
                    <div class="toast-header border-0 bg-transparent text-white pb-0 pt-2 px-3">
                        <i class="bi ${icon} mr-2"></i>
                        <strong class="mr-auto font-monospace small tracking-wider">${title}</strong>
                        <button type="button" class="ml-2 mb-1 close text-white" data-dismiss="toast" style="text-shadow: none; opacity: 0.8; outline: none;">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="toast-body font-monospace small pt-1 pb-2 px-3 text-muted">
                        > ${message}
                    </div>
                </div>`;

            $('#sys-toast-container').append(toastHtml);
            $('#' + toastId).toast('show');
            $('#' + toastId).on('hidden.bs.toast', function () { $(this).remove(); });
        };

        // 全局挂载：系统级确认函数
        window.sysConfirm = function(message, callback) {
            $('#sysConfirmMessage').text(message);
            $('#sysConfirmModal').modal('show');
            $('#sysConfirmBtn').off('click').on('click', function() {
                $('#sysConfirmModal').modal('hide');
                if (callback) callback();
            });
        };
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
